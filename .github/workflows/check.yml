name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  host:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: biome lint (TS)
        run: bun run lint
      - name: codegen drift gate
        run: |
          bun run codegen
          git diff --exit-code -- 'protocol/src/*.generated.ts' client/source/protocol.h
      - run: bun run typecheck
      - run: bun test
      - name: build single-binary host (libsodium-wrappers under bun build --compile)
        run: |
          bun run build:host
          test -x dist/3dsendai-host

  names:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: filename casing (ls-lint)
        run: bunx @ls-lint/ls-lint@2

  clint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: C static analysis (clang-format, cppcheck, clang-tidy)
        run: client/tools/lint.sh

  whitespace:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: whitespace gate (git diff --check vs empty tree)
        run: |
          empty=$(git hash-object -t tree /dev/null)
          git diff --check "$empty" -- \
            protocol host client \
            ':(exclude)client/source/monocypher.*' \
            ':(exclude)client/source/quirc.*' \
            ':(exclude)client/test/vendor' \
            ':(exclude)host/test/fixtures' \
            ':(exclude)*.generated.ts' \
            ':(exclude)*.md'

  ccore:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: host-compiled C core tests
        run: client/test/run.sh

  build3ds:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      # Pinned by digest for reproducibility. To bump:
      # docker pull devkitpro/devkitarm:latest
      # docker inspect --format='{{index .RepoDigests 0}}' devkitpro/devkitarm:latest
      - name: build 3DS client (devkitARM)
        run: docker run --rm -v "$PWD/client":/work -w /work devkitpro/devkitarm@sha256:116afba8df8453961de2936ffab20dd441edf4d682856c1ec8b0e53d7ed0bbf5 make
      - uses: actions/upload-artifact@v5
        with:
          name: 3dsendai-3dsx
          path: client/3dsendai.3dsx
